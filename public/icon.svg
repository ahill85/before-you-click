  <circle cx="74" cy="86" r="8" fill="#292524"/>
  <circle cx="126" cy="86" r="8" fill="#292524"/>
  <circle cx="77" cy="83" r="3" fill="#fff"/>
  <circle cx="129" cy="83" r="3" fill="#fff"/>
